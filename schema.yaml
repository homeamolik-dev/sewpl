  schemas:
    Car:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        car_number:
          type: string
          maxLength: 100
        car_make:
          type: string
          maxLength: 100
        car_model:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 200
        purpose_of_visit:
          type: string
          maxLength: 200
        all_job_cards: {}
        cars_table_id:
          type: string
          nullable: true
          maxLength: 100
        customer_name:
          type: string
          maxLength: 200
        customer_phone:
          type: string
          maxLength: 20
